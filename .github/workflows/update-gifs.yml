name: Actualizar countdown GIFs

# Regenera gifs/<name>.gif a partir de programmed-timers/*.json y commitea
# los cambios al repo. El GIF siempre tiene el mismo nombre (se sobreescribe),
# así cualquier <img> que lo embeba queda al día.
#
# ⚠️ LÍMITE DE GITHUB ACTIONS: el cron mínimo es 5 MINUTOS, no 5 segundos
# (y los schedules pueden retrasarse/saltarse si los runners están cargados).
# Para una cadencia real de 5s hay que correr el daemon `pipeline/pipeline.js`
# en un servidor propio (ver README). Acá usamos cada 5 min.

on:
  schedule:
    - cron: '*/5 * * * *'        # cada 5 minutos (mínimo permitido)
  workflow_dispatch: {}           # botón manual "Run workflow"
  push:
    branches: [main]
    paths:                        # regen inmediata si cambian timers o el render
      - 'programmed-timers/**'
      - 'countdown.html'
      - 'pipeline/**'
      - '.github/workflows/update-gifs.yml'

# Permiso para que el job pueda commitear/pushear los GIFs
permissions:
  contents: write

# Evita que dos corridas se pisen (sin cancelar la que está commiteando)
concurrency:
  group: update-gifs
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependencias
        working-directory: pipeline
        run: npm ci

      - name: Renderizar GIFs
        working-directory: pipeline
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: node pipeline.js --once

      - name: Commitear GIFs actualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gifs
          if git diff --staged --quiet; then
            echo "Sin cambios en los GIFs."
          else
            git commit -m "chore: actualizar countdown GIFs [skip ci]"
            git push
          fi
